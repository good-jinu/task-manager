name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/jdx/mise:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env from ENV_FILE secret
        run: |
          if [ -z "${{ secrets.ENV_FILE }}" ]; then
            echo "ENV_FILE secret is not set."
            exit 1
          fi
          printf '%s' "${{ secrets.ENV_FILE }}" > .env

      - name: Install tools and dependencies
        run: mise install

      - name: Deploy
        run: mise run deploy
